<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak AI⁺ — Painel do Gestor de Matrículas</title>
    <style>
        :root {
            --bg: #0a1118;
            --card: #101b26;
            --borda: #1b2e40;
            --marca: #cca43b;
            --txt: #ffffff;
            --txt-dim: #8da2b5;
        }
        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card);
            border: 1px solid var(--borda);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            font-weight: 400;
            color: var(--txt);
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }
        h2 span { color: var(--marca); }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--txt-dim);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--borda);
            padding: 12px;
            border-radius: 4px;
            color: var(--txt);
            font-size: 1rem;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--marca);
        }
        button {
            width: 100%;
            background-color: var(--marca);
            color: var(--bg);
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Matrícula Corporativa <span>Speak AI⁺</span></h2>
        <form id="formCadastro" onsubmit="executarFluxoCadastro(event)">
            <div class="form-group">
                <label>Nome do Aluno</label>
                <input type="text" id="nome" placeholder="Ex: Bruno Silva" required>
            </div>
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" id="email" placeholder="bruno@empresa.com.br" required>
            </div>
            <div class="form-group">
                <label>WhatsApp (com DDD)</label>
                <input type="tel" id="whatsapp" placeholder="27999998888" required>
            </div>
            <div class="form-group">
                <label>Plano de Acesso</label>
                <select id="plano">
                    <option value="Free">Free (Até 5 mensagens)</option>
                    <option value="Premium Trial">Premium Trial (7 dias)</option>
                    <option value="Básico">Básico (R$ 29,90/mês)</option>
                    <option value="Premium">Premium (R$ 99,90/mês)</option>
                </select>
            </div>
            <button type="submit" id="btnSubmit">Finalizar e Emitir Credenciais</button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxjL1V3I7Y6X8IbyY7_m0tXQpA6uX_xXxXXXXX/exec"; // Mesma URL do Apps Script

        async function ejecutarFluxoCadastro(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "PROCESSANDO IMPLANTAÇÃO...";
            btn.disabled = true;

            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim().replace(/\D/g, ''),
                plano: document.getElementById('plano').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        acao: "cadastrar_aluno",
                        dados: dados
                    })
                });

                const resultado = await response.json();

                if (resultado.status === "sucesso") {
                    // 1. Mensagem para o WhatsApp do Aluno
                    const mensagemTexto = `Bem vindo\n\nVocê agora faz parte do Speak AI do EU+ Executivo do Grupo EU+\n\nQue o seu nível de proficiência avance assim como a sua carreira.\n\nAbaixo sua senha de acesso: *${resultado.senha}*\n\nSegue o link para a página do Aluno:\nhttps://eumaisempresa.github.io/speakai/aluno/\n\nAtenciosamente, Grupo EU+`;
                    
                    const whatsappUrl = `https://wa.me/55${dados.whatsapp}?text=${encodeURIComponent(mensagemTexto)}`;
                    
                    // Dispara abertura da aba do WhatsApp
                    window.open(whatsappUrl, '_blank');
                    
                    alert("Aluno registrado! Enviando notificações e direcionando ao ecossistema...");

                    // 2. Redirecionamento automático com parâmetro de e-mail limpo
                    window.location.href = `https://eumaisempresa.github.io/speakai/aluno/?email=${encodeURIComponent(dados.email)}`;
                } else {
                    alert("Erro: " + resultado.message);
                    btn.innerText = "Finalizar e Emitir Credenciais";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Falha de comunicação de dados com o servidor.");
                btn.innerText = "Finalizar e Emitir Credenciais";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
