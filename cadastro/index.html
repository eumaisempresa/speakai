<script>
    // URL CENTRAL DO SEU ECOSSISTEMA (APPS SCRIPT)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJ4V37D57Q-wUUBvfPncAK5XqRjN119zWz5O-hwvAYNUgAbAROlWN2Uw2QVwTztjY/exec"; // Certifique-se de usar a sua URL de implantação ativa

    // Função que intercepta o envio do seu formulário original
    async function executarFluxoCadastro(e) {
        e.preventDefault();
        
        // Mantém os IDs originais dos seus inputs para capturar os dados
        const campoNome = document.getElementById('nome') || document.getElementById('nome_estudante');
        const campoEmail = document.getElementById('email');
        const campoWhatsapp = document.getElementById('whatsapp');
        const campoPlano = document.getElementById('plano');
        const btnSubmit = document.querySelector('button[type="submit"]') || document.getElementById('btnSubmit');

        if (!campoNome || !campoEmail || !campoWhatsapp) {
            alert("Erro interno: IDs dos campos do formulário não localizados.");
            return;
        }

        const dados = {
            nome: campoNome.value.trim(),
            email: campoEmail.value.trim(),
            whatsapp: campoWhatsapp.value.trim().replace(/\D/g, ''), // Limpa para deixar apenas números
            plano: campoPlano ? campoPlano.value : "Free"
        };

        // Feedback visual discreto no seu próprio botão
        const textoBotaoOriginal = btnSubmit.innerText;
        btnSubmit.innerText = "PROCESSANDO...";
        btnSubmit.disabled = true;

        try {
            // Envio em formato texto limpo para evitar bloqueio de CORS no Google Apps Script
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    acao: "cadastrar_aluno",
                    dados: dados
                })
            });

            const resultado = await response.json();

            if (resultado.status === "sucesso") {
                // 1. Montagem da mensagem oficial do Grupo EU+ para o WhatsApp
                const mensagemTexto = `Bem vindo\n\nVocê agora faz parte do Speak AI do EU+ Executivo do Grupo EU+\n\nQue o seu nível de proficiência avance assim como a sua carreira.\n\nAbaixo sua senha de acesso: *${resultado.senha}*\n\nSegue o link para a página do Aluno:\nhttps://eumaisempresa.github.io/speakai/aluno/\n\nAtenciosamente, Grupo EU+`;
                
                const whatsappUrl = `https://wa.me/55${dados.whatsapp}?text=${encodeURIComponent(mensagemTexto)}`;
                
                // 2. Abre o WhatsApp em uma aba secundária imediatamente
                window.open(whatsappUrl, '_blank');
                
                // 3. Redireciona a janela principal para a tela do aluno preenchendo o e-mail automaticamente
                window.location.href = `https://eumaisempresa.github.io/speakai/aluno/?email=${encodeURIComponent(dados.email)}`;
            } else {
                alert("Erro no Servidor: " + resultado.message);
                btnSubmit.innerText = textoBotaoOriginal;
                btnSubmit.disabled = false;
            }
        } catch (err) {
            alert("Falha de comunicação: Verifique se a URL do Apps Script está atualizada e publicada como 'Qualquer pessoa'.");
            btnSubmit.innerText = textoBotaoOriginal;
            btnSubmit.disabled = false;
        }
    }

    // Vincula o evento de envio ao seu formulário original assim que a página carregar
    window.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('form') || document.getElementById('formCadastro');
        if (form) {
            form.addEventListener('submit', executarFluxoCadastro);
        }
        
        // Ajuste solicitado: Mudar o label de "E-mail Corporativo" para apenas "E-mail"
        // Procura por qualquer texto contendo "E-mail Corporativo" nas labels e corrige dinamicamente
        const labels = document.querySelectorAll('label');
        labels.forEach(label => {
            if (label.innerText.toLowerCase().includes('corporativo') && label.innerText.toLowerCase().includes('e-mail')) {
                label.innerText = 'E-mail';
            }
        });
    </script>
