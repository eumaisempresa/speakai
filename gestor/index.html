<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestor | Speak AI⁺ — EU⁺ Gestor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #060E18;
            --bg-secundario: #0A1624;
            --bg-terciario: #0E1E30;
            --dourado: #C4974A;
            --dourado-subtle: rgba(196,151,74,0.18);
            --txt-principal: #EEF0F2;
            --txt-secundario: #7A8FA3;
            --status-ok: #52C41A;
            --status-alerta: #FAAD14;
            --status-erro: #FF4D4F;
        }
        body {
            background-color: var(--bg-principal);
            color: var(--txt-principal);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--bg-secundario);
            border-bottom: 1px solid var(--dourado-subtle);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-family: 'Cormorant Garamond', serif; font-weight: 400; margin: 0; font-size: 1.8rem; }
        h1 span.sup { font-weight: 600; color: var(--dourado); font-size: 0.42em; vertical-align: super; }
        .subtitle { font-size: 0.85rem; color: var(--txt-secundario); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .main-content { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .table-container { background-color: var(--bg-secundario); border: 1px solid var(--dourado-subtle); border-radius: 4px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: var(--bg-terciario); color: var(--txt-secundario); font-weight: 400; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 16px 20px; border-bottom: 1px solid var(--dourado-subtle); }
        td { padding: 16px 20px; border-bottom: 1px solid rgba(122,143,163,0.1); font-size: 0.95rem; color: var(--txt-principal); white-space: nowrap; }
        tr:hover { background-color: rgba(14,30,48,0.4); }
        
        select.plan-select {
            background-color: var(--bg-principal);
            border: 1px solid var(--dourado-subtle);
            color: var(--txt-principal);
            padding: 6px 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            border-radius: 2px;
            cursor: pointer;
        }
        select.plan-select:focus { border-color: var(--dourado); outline: none; }

        .btn-wa {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            border: 1px solid var(--dourado);
            color: var(--dourado);
            padding: 6px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            border-radius: 2px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-wa:hover { background-color: var(--dourado); color: var(--bg-principal); }

        .btn-delete {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            border: 1px solid var(--status-erro);
            color: var(--status-erro);
            padding: 6px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            border-radius: 2px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            margin-left: 8px;
        }
        .btn-delete:hover { background-color: var(--status-erro); color: #fff; }
        
        /* Estilos do Status Financeiro */
        .badge-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-pago { background-color: rgba(82,148,26,0.15); color: var(--status-ok); }
        .status-pendente { background-color: rgba(250,173,20,0.15); color: var(--status-alerta); }
        .status-expirado { background-color: rgba(255,77,79,0.15); color: var(--status-erro); }

        code { background-color: var(--bg-terciario); padding: 4px 8px; border-radius: 2px; color: #e4be7d; font-family: monospace; }
        footer { margin-top: 60px; padding: 25px; text-align: center; border-top: 1px solid var(--dourado-subtle); font-size: 0.8rem; color: var(--txt-secundario); }
        footer a { color: var(--txt-secundario); text-decoration: none; }
        
        .loading-text { text-align: center; padding: 30px; font-style: italic; color: var(--txt-secundario); }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Speak AI<span class="sup">⁺</span> <span style="font-size: 0.6em; color: var(--txt-secundario);">| Central ADM</span></h1>
        </div>
        <div class="subtitle">Liderar é transformar direção em resultado.</div>
    </header>

    <div class="main-content">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 1.6rem; color: var(--dourado);">Gestão de Licenças e Planos</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Estudante</th>
                        <th>WhatsApp</th>
                        <th>Nível</th>
                        <th>Senha Corporativa</th>
                        <th>Gerenciar Plano</th>
                        <th>Status Financeiro</th>
                        <th>Aba Destino</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr>
                        <td colspan="9" class="loading-text">Buscando informações em tempo real na planilha...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <a href="https://www.eumaisempresa.com.br" target="_blank">Grupo EU⁺</a> &gt; 
        <a href="https://linkedin.com/company/eumaisempresa" target="_blank">EU⁺ Empresa</a> &gt; 
        <a href="@eumaisgestor">EU⁺ Gestor</a> &gt; Speak AI<span style="font-size:0.7em;vertical-align:super;">⁺</span>
    </footer>

    <script>
        // Defina a URL exata da sua API gerada no Google Apps Script (Web App)
        const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbwJ4V37D57Q-wUUBvfPncAK5XqRjN119zWz5O-hwvAYNUgAbAROlWN2Uw2QVwTztjY/exec";

        // Busca inicial de dados reais ao carregar a página
        window.addEventListener('DOMContentLoaded', buscarDadosPlanilha);

        async function buscarDadosPlanilha() {
            try {
                const resposta = await fetch(`${URL_GOOGLE_SCRIPT}?acao=listar_alunos`);
                const resultado = await resposta.json();
                
                if (resultado.status === "sucesso") {
                    renderizarTabela(resultado.alunos);
                } else {
                    exibirErroTabela("Erro ao retornar os dados da planilha.");
                }
            } catch (erro) {
                exibirErroTabela("Falha ao se conectar com a planilha. Verifique a URL do Script.");
            }
        }

        function renderizarTabela(alunos) {
            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = "";

            if (alunos.length === 0) {
                corpo.innerHTML = `<tr><td colspan="9" class="loading-text">Nenhum aluno registrado encontrado.</td></tr>`;
                return;
            }

            alunos.forEach(aluno => {
                const tr = document.createElement('tr');
                
                // Mapeamento dinâmico de classe de status
                let classeStatus = "status-pago";
                let statusTexto = aluno.status_pagamento || "Em dia";
                if (statusTexto.toLowerCase() === "pendente") classeStatus = "status-pendente";
                if (statusTexto.toLowerCase() === "expirado" || statusTexto.toLowerCase() === "atrasado") classeStatus = "status-expirado";

                // Montagem da mensagem personalizada de Upgrade condicional
                const msgUpgrade = obterMensagemUpgradePersonalizada(aluno.nome, aluno.plano);
                const urlWhatsApp = `https://wa.me/55${aluno.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(msgUpgrade)}`;

                tr.innerHTML = `
                    <td>${aluno.id || 'N/A'}</td>
                    <td><strong>${aluno.nome}</strong><br><span style="font-size:0.8rem; color:var(--txt-secundario);">${aluno.email}</span></td>
                    <td>${aluno.whatsapp}</td>
                    <td>${aluno.nivel || 'A1'}</td>
                    <td><code>${aluno.senha || '---'}</code></td>
                    <td>
                        <select class="plan-select" onchange="atualizarPlanoNoSheets('${aluno.email}', this.value, this)">
                            <option value="Premium Trial" ${aluno.plano === "Premium Trial" ? "selected" : ""}>Premium Trial (7d)</option>
                            <option value="Free" ${aluno.plano === "Free" ? "selected" : ""}>Free</option>
                            <option value="Básico" ${aluno.plano === "Básico" ? "selected" : ""}>Básico</option>
                            <option value="Premium" ${aluno.plano === "Premium" ? "selected" : ""}>Premium</option>
                            <option value="Exclusive Enterprise" ${aluno.plano === "Exclusive Enterprise" ? "selected" : ""}>Exclusive Enterprise</option>
                        </select>
                    </td>
                    <td><span class="badge-status ${classeStatus}">${statusTexto}</span></td>
                    <td><code>${aluno.aba_destino || '---'}</code></td>
                    <td>
                        <a href="${urlWhatsApp}" target="_blank" class="btn-wa">Upgrade</a>
                        <button class="btn-delete" onclick="deletarAlunoNoSheets('${aluno.email}', this)">Excluir</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        }

        // CORREÇÃO 3: Gerador dinâmico de mensagens dependendo de qual plano ele está
        function obterMensagemUpgradePersonalizada(nome, planoAtual) {
            if (planoAtual === "Premium Trial") {
                return `Olá ${nome}, notamos que seu período Premium Trial de 7 dias no Speak AI⁺ está ativo e performando muito bem! Que tal fazer o upgrade para o Plano Premium Anual hoje e garantir acesso contínuo e ilimitado à sua banca de erros do Shadow Tracker?`;
            } else if (planoAtual === "Free" || planoAtual === "Básico") {
                return `Olá ${nome}! Vimos que você está utilizando o plano ${planoAtual} no Speak AI⁺. Para acelerar seus resultados rumo à liderança internacional, liberamos uma condição para você migrar para o Plano Premium. Vamos ativar?`;
            } else if (planoAtual === "Premium") {
                return `Olá Conselheiro ${nome}, sua jornada no plano Premium do Speak AI⁺ tem sido fantástica. O próximo passo estratégico para sua carreira é o Exclusive Enterprise, com simulação customizada de conselhos de administração e suporte focado de IA. Podemos agendar uma demonstração?`;
            } else {
                return `Olá ${nome}, tudo bem? Temos novidades e módulos de expansão exclusivos para o seu plano no Speak AI⁺. Vamos conversar?`;
            }
        }

        // CORREÇÃO 2: Alteração de plano real enviada via POST para a planilha
        async function atualizarPlanoNoSheets(emailAluno, novoPlano, selectElement) {
            selectElement.disabled = true;
            try {
                const resposta = await fetch(URL_GOOGLE_SCRIPT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        acao: "editar_plano",
                        email: emailAluno,
                        novo_plano: novoPlano
                    })
                });
                const resultado = await resposta.json();
                if (resultado.status === "sucesso") {
                    alert("Plano atualizado com sucesso na planilha!");
                    buscarDadosPlanilha(); // Recarrega para redesenhar a tabela e recalcular mensagens de upgrade
                } else {
                    alert("Erro ao atualizar o plano. Tente novamente.");
                    selectElement.disabled = false;
                }
            } catch (erro) {
                alert("Erro de comunicação com o servidor.");
                selectElement.disabled = false;
            }
        }

        // CORREÇÃO 1: Remoção de linha real na planilha e recarregamento instantâneo
        async function deletarAlunoNoSheets(emailAluno, botaoElement) {
            if (!confirm(`Confirma a exclusão definitiva do aluno vinculado ao e-mail ${emailAluno}?`)) return;
            
            botaoElement.disabled = true;
            botaoElement.innerText = "...";

            try {
                const resposta = await fetch(URL_GOOGLE_SCRIPT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        acao: "excluir_aluno",
                        email: emailAluno
                    })
                });
                const resultado = await resposta.json();
                if (resultado.status === "sucesso") {
                    alert("Aluno excluído da planilha com sucesso!");
                    buscarDadosPlanilha(); // Atualiza em tempo real sem deixar resíduos visuais
                } else {
                    alert("Não foi possível excluir o aluno.");
                    botaoElement.disabled = false;
                    botaoElement.innerText = "Excluir";
                }
            } catch (erro) {
                alert("Erro de rede ao tentar deletar.");
                botaoElement.disabled = false;
                botaoElement.innerText = "Excluir";
            }
        }

        function exibirErroTabela(mensagem) {
            document.getElementById('tabelaCorpo').innerHTML = `<tr><td colspan="9" class="loading-text" style="color: var(--status-erro);">${mensagem}</td></tr>`;
        }
    </script>
</body>
</html>
