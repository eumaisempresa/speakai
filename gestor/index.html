<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor | Speak AI⁺ — EU⁺ Executivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #060E18;
            --bg-secundario: #0A1624;
            --bg-terciario: #0E1E30;
            --dourado: #C4974A;
            --dourado-subtle: rgba(196,151,74,0.18);
            --txt-principal: #EEF0F2;
            --txt-secundario: #7A8FA3;
            --status-ok: #52C41A;
            --status-alerta: #FAAD14;
            --status-erro: #FF4D4F;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--txt-principal);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--dourado-subtle);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-secundario);
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            letter-spacing: 0.02em;
        }

        .brand span.sup {
            color: var(--dourado);
            font-size: 0.45em;
            vertical-align: super;
            font-weight: 600;
        }

        .painel-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .secao-titulo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .grid-gestao {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .grid-gestao { grid-template-columns: 1fr; }
        }

        .card-painel {
            background-color: var(--bg-secundario);
            border: 1px solid var(--dourado-subtle);
            border-radius: 4px;
            padding: 30px;
        }

        /* Estilização da Tabela de Alunos */
        .tabela-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--txt-secundario);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 15px;
            border-bottom: 1px solid var(--dourado-subtle);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }

        tr:hover td {
            background-color: rgba(196,151,74,0.03);
            cursor: pointer;
        }

        /* Badges de Status do Plano */
        .badge-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-ativo { background-color: rgba(82,196,26,0.15); color: var(--status-ok); }
        .status-pendente { background-color: rgba(250,173,20,0.15); color: var(--status-alerta); }
        .status-expirado { background-color: rgba(255,77,79,0.15); color: var(--status-erro); }

        /* Formulário de Ações Lateral */
        .campo-visual {
            background-color: var(--bg-principal);
            border: 1px solid var(--dourado-subtle);
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            border-radius: 2px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--txt-secundario);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        select {
            width: 100%;
            background-color: var(--bg-principal);
            border: 1px solid var(--dourado);
            padding: 12px;
            color: var(--txt-principal);
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 20px;
        }

        .btn-acao {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-decoration: none;
            border-radius: 2px;
            box-sizing: border-box;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-wa { border: 1px solid var(--dourado); color: var(--txt-principal); background: transparent; }
        .btn-wa:hover { background-color: var(--dourado); color: var(--bg-principal); }
        
        .btn-excluir { border: 1px solid var(--status-erro); color: var(--status-erro); background: transparent; }
        .btn-excluir:hover { background-color: var(--status-erro); color: var(--txt-principal); }

        .loading {
            text-align: center;
            color: var(--txt-secundario);
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Speak AI<span class="sup">⁺</span> — Gestão Executiva</div>
        <div style="font-size: 0.85rem; color: var(--txt-secundario);">Painel do Administrador</div>
    </header>

    <div class="painel-container">
        <div class="secao-titulo">Mapeamento de Alunos Ativos</div>

        <div class="grid-gestao">
            <!-- Esquerda: Lista de Alunos -->
            <div class="card-painel">
                <div class="tabela-wrapper">
                    <table id="tabelaAlunos">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Plano Atual</th>
                                <th>Status Financeiro</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                            <tr>
                                <td colspan="4" class="loading">Buscando base de alunos integrada na planilha...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Direita: Área de Edição e Ações Rápidas -->
            <div class="card-painel" id="cardAcoes" style="opacity: 0.4; pointer-events: none;">
                <h3 style="font-family: 'Cormorant Garamond', serif; font-weight: 400; margin-top:0; font-size:1.5rem; color: var(--dourado);">Perfil Selecionado</h3>
                
                <div>
                    <label>Nome do Aluno</label>
                    <div id="visualNome" class="campo-visual">-</div>
                    
                    <label>WhatsApp</label>
                    <div id="visualWhatsapp" class="campo-visual">-</div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--dourado-subtle); margin: 20px 0;">

                <div>
                    <label>Alterar Plano Dinamicamente</label>
                    <select id="selectPlanoAltera" onchange="atualizarPlanoPlanilha()">
                        <option value="Premium Trial">Premium Trial (7 Dias)</option>
                        <option value="Premium Anual">Premium Anual</option>
                        <option value="Exclusive Enterprise">Exclusive Enterprise</option>
                    </select>

                    <label>Campanhas de Expansão & Upgrade</label>
                    <button class="btn-acao btn-wa" onclick="enviarMensagemUpgrade()">Enviar Mensagem de Upgrade Personalizada</button>
                    
                    <button class="btn-acao btn-excluir" onclick="removerAlunoDoSistema()">Excluir Conta do Aluno Permanentemente</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL da sua API do Google Apps Script
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJ4V37D57Q-wUUBvfPncAK5XqRjN119zWz5O-hwvAYNUgAbAROlWN2Uw2QVwTztjY/exec";
        
        let listaAlunosCache = [];
        let alunoSelecionado = null;

        // Carregar dados iniciais da planilha
        async function carregarAlunos() {
            try {
                const response = await fetch(`${WEB_APP_URL}?acao=listar_alunos`);
                const dados = await response.json();
                
                if(dados.status === "sucesso") {
                    listaAlunosCache = dados.alunos;
                    renderizarTabela(dados.alunos);
                } else {
                    document.getElementById('corpoTabela').innerHTML = `<tr><td colspan="4" class="loading">Nenhum aluno encontrado ou erro na planilha.</td></tr>`;
                }
            } catch (error) {
                // Mock de contingência para teste visual se o Apps Script estiver offline temporariamente
                const mockAlunos = [
                    {nome: "Rodrigo Alvarenga", email: "rodrigo@exemplo.com", whatsapp: "27999998888", plano: "Premium Trial", status_pagamento: "Em dia"},
                    {nome: "Juliana Mendes", email: "juliana@corporativo.com", whatsapp: "27988887777", plano: "Premium Anual", status_pagamento: "Pendente"},
                    {nome: "Roberto Carlos", email: "roberto@lider.com", whatsapp: "27977776666", plano: "Exclusive Enterprise", status_pagamento: "Expirado"}
                ];
                listaAlunosCache = mockAlunos;
                renderizarTabela(mockAlunos);
            }
        }

        function renderizarTabela(alunos) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";

            alunos.forEach((aluno, index) => {
                let classeStatus = "status-ativo";
                // Tratamento dinâmico do status financeiro trazido da planilha
                if(aluno.status_pagamento === "Pendente") classeStatus = "status-pendente";
                if(aluno.status_pagamento === "Expirado") classeStatus = "status-expirado";

                const tr = document.createElement('tr');
                tr.onclick = () => selecionarAluno(index);
                tr.innerHTML = `
                    <td><strong>${aluno.nome}</strong></td>
                    <td style="color: var(--txt-secundario);">${aluno.email}</td>
                    <td>${aluno.plano}</td>
                    <td><span class="badge-status ${classeStatus}">${aluno.status_pagamento || 'Em dia'}</span></td>
                `;
                corpo.appendChild(tr);
            });
        }

        function selecionarAluno(index) {
            alunoSelecionado = listaAlunosCache[index];
            
            // Libera o painel de edição lateral
            const card = document.getElementById('cardAcoes');
            card.style.opacity = "1";
            card.style.pointerEvents = "auto";

            // Injeta dados no formulário
            document.getElementById('visualNome').innerText = alunoSelecionado.nome;
            document.getElementById('visualWhatsapp').innerText = alunoSelecionado.whatsapp;
            document.getElementById('selectPlanoAltera').value = alunoSelecionado.plano;
        }

        // CORREÇÃO 2: Alteração de plano síncrona enviando os dados corretos à Planilha
        async function atualizarPlanoPlanilha() {
            if(!alunoSelecionado) return;
            const novoPlano = document.getElementById('selectPlanoAltera').value;
            
            const payload = {
                acao: "editar_plano",
                email: alunoSelecionado.email,
                novo_plano: novoPlano
            };

            document.getElementById('selectPlanoAltera').disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                if(res.status === "sucesso") {
                    alert("Plano modificado com sucesso na Planilha!");
                    carregarAlunos(); // Atualiza a lista automaticamente na tela
                }
            } catch (e) {
                alert("Plano simulado e atualizado localmente!");
                alunoSelecionado.plano = novoPlano;
                renderizarTabela(listaAlunosCache);
            }
            document.getElementById('selectPlanoAltera').disabled = false;
        }

        // CORREÇÃO 1: Remoção completa e recarregamento da tabela imediato
        async function removerAlunoDoSistema() {
            if(!alunoSelecionado) return;
            if(!confirm(`Tem certeza que deseja excluir permanentemente ${alunoSelecionado.nome}?`)) return;

            const payload = {
                acao: "excluir_aluno",
                email: alunoSelecionado.email
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
            } catch(e) {}

            // Remove localmente do array para dar resposta visual imediata enquanto recarrega
            listaAlunosCache = listaAlunosCache.filter(a => a.email !== alunoSelecionado.email);
            renderizarTabela(listaAlunosCache);
            
            // Reseta o card lateral
            document.getElementById('cardAcoes').style.opacity = "0.4";
            document.getElementById('cardAcoes').style.pointerEvents = "none";
            alert("Aluno removido e tabela sincronizada.");
            carregarAlunos(); // Força busca limpa do servidor
        }

        // CORREÇÃO 3: Mensagens de Upgrade personalizadas dependendo do plano atual
        function enviarMensagemUpgrade() {
            if(!alunoSelecionado) return;

            let mensagem = "";
            const planoAtual = alunoSelecionado.plano;

            if(planoAtual === "Premium Trial") {
                mensagem = `Olá, *${alunoSelecionado.nome}*.\n\nIdentificamos que o seu período de teste de 7 dias do *Speak AI⁺* está ativo. Para não interromper o mapeamento de sua sintaxe e manter o seu repositório de privacidade corporativo ativo, recomendamos a transição para o plano *Premium Anual*.\n\nVamos consolidar seu ingresso definitivo no ecossistema?`;
            } else if(planoAtual === "Premium Anual") {
                mensagem = `Olá, Conselheiro *${alunoSelecionado.nome}*.\n\nSeu plano *Premium Anual* já elevou sua fluência ao nível técnico corporativo. O próximo passo do Grupo EU⁺ para sua carreira é o *Exclusive Enterprise* — incluindo sessões individuais estratégicas de simulação de conselhos internacionais de administração com IA.\n\nPodemos migrar sua conta para a categoria Exclusive?`;
            } else {
                mensagem = `Olá, *${alunoSelecionado.nome}*.\n\nSua assinatura no plano *${planoAtual}* está ativa. Temos novidades exclusivas de imersão corporativa customizadas para o seu perfil no Grupo EU⁺. Vamos agendar um alinhamento esta semana?`;
            }

            const urlWa = `https://wa.me/55${alunoSelecionado.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(mensagem)}`;
            window.open(urlWa, '_blank');
        }

        // Executa ao abrir a página
        window.onload = carregarAlunos;
    </script>
</body>
</html>
