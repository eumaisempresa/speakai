<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak AI⁺ — Aluno Executivo</title>
    <style>
        :root {
            --bg-principal: #0a1118;
            --bg-card: #101b26;
            --marca: #cca43b;
            --marca-hover: #b38f32;
            --txt-principal: #ffffff;
            --txt-secundario: #8da2b5;
            --borda: #1b2e40;
            --msg-user: #1c354d;
            --msg-ai: #132230;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--txt-principal);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* TELA DE LOGIN */
        .login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--borda);
            text-align: center;
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .login-card h2 span {
            color: var(--marca);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--txt-secundario);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background-color: #f0f4f8;
            border: none;
            padding: 15px;
            border-radius: 4px;
            color: #1c2d3d;
            font-size: 1rem;
            outline: none;
        }

        .btn-login {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--marca);
            color: var(--txt-principal);
            padding: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--marca);
            color: var(--bg-principal);
        }

        /* CONTAINER PRINCIPAL DO APP */
        .app-container {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--borda);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 400;
        }

        header h1 span {
            color: var(--marca);
        }

        .user-session {
            font-size: 0.85rem;
            color: var(--txt-secundario);
        }

        .chat-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user {
            background-color: var(--msg-user);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.ai {
            background-color: var(--msg-ai);
            align-self: flex-start;
            border-bottom-left-radius: 0;
            border-left: 3px solid var(--marca);
        }

        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--borda);
            padding: 20px 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        footer input {
            flex: 1;
            background-color: var(--bg-principal);
            border: 1px solid var(--borda);
            padding: 15px;
            border-radius: 4px;
            color: var(--txt-principal);
            font-size: 1rem;
            outline: none;
        }

        footer input:focus {
            border-color: var(--marca);
        }

        .btn-action {
            background-color: var(--marca);
            color: var(--bg-principal);
            border: none;
            padding: 15px 25px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background-color: var(--marca-hover);
        }

        .btn-mic {
            background-color: var(--bg-principal);
            color: var(--txt-principal);
            border: 1px solid var(--borda);
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-mic.recording {
            background-color: #cc3b3b;
            color: white;
            border-color: #cc3b3b;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN AUTOMATIZADA (image_9e801e.png CORRIGIDA) -->
    <div class="login-screen" id="telaLogin">
        <div class="login-card">
            <h2>Speak AI<span>⁺</span></h2>
            <div style="color: var(--txt-secundario); font-size: 0.85rem; margin-bottom: 25px; font-weight: 300;">Identificação Corporativa Obrigatória</div>
            
            <div class="input-group">
                <label>E-mail Cadastrado</label>
                <input type="email" id="loginEmail" placeholder="seuemail@email.com.br" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Senha Executiva (EXECxxxx)</label>
                <input type="password" id="loginSenha" placeholder="••••••••" required>
            </div>
            <button class="btn-login" onclick="autenticarUsuario()">Acessar Ecossistema</button>
        </div>
    </div>

    <!-- PAINEL OPERACIONAL PRINCIPAL -->
    <div class="app-container" id="containerPrincipal">
        <header>
            <h1>Speak AI<span>⁺</span></h1>
            <div class="user-session" id="identificadorUsuario">Carregando sessão...</div>
        </header>

        <div class="chat-area" id="chatBox">
            <div class="message ai">Welcome to Speak AI⁺. Let's start our alignment session. I'm listening.</div>
        </div>

        <footer>
            <button class="btn-mic" id="micBtn" onclick="alternarGravacao()">🎙️</button>
            <input type="text" id="userInput" placeholder="Type your executive message in English..." onkeypress="verificarTecla(event)">
            <button class="btn-action" onclick="enviarMensagemTexto()">Send</button>
        </footer>
    </div>

    <script>
        // URL da API Centralizada do Google Apps Script
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxjL1V3I7Y6X8IbyY7_m0tXQpA6uX_xXxXXXXX/exec"; // Substitua com sua URL de implantação ativa

        let usuarioSessao = {
            email: "",
            aba: ""
        };

        let gravando = false;
        let recognition = null;

        // Auto-captura de e-mail parâmetro da URL vindo do cadastro
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById('loginEmail').value = decodeURIComponent(emailParam);
            }
            configurarReconhecimentoVoz();
        });

        // Autenticação e Mapeamento Dinâmico de Abas
        async function autenticarUsuario() {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value.trim();
            const btn = document.querySelector('.btn-login');

            if (!email || !senha) {
                alert("Por favor, insira suas credenciais.");
                return;
            }

            btn.innerText = "AUTENTICANDO...";

            try {
                // Requisição ao Gestor para mapeamento de autenticação
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ acao: "buscar_alunos" })
                });
                
                const resultado = await response.json();
                
                if (resultado.status === "sucesso") {
                    const alunoEncontrado = resultado.dados.find(a => a.email.toLowerCase() === email.toLowerCase() && a.senha === senha.toUpperCase());
                    
                    if (alunoEncontrado) {
                        usuarioSessao.email = alunoEncontrado.nome;
                        usuarioSessao.aba = alunoEncontrado.aba;

                        document.getElementById('identificadorUsuario').innerText = `Executive: ${alunoEncontrado.nome} (${alunoEncontrado.plano})`;
                        document.getElementById('telaLogin').style.display = 'none';
                        document.getElementById('containerPrincipal').style.display = 'flex';
                    } else {
                        alert("E-mail ou Senha Corporativa inválidos.");
                        btn.innerText = "ACESSAR ECOSSISTEMA";
                    }
                } else {
                    alert("Erro ao conectar ao servidor central.");
                    btn.innerText = "ACESSAR ECOSSISTEMA";
                }
            } catch (err) {
                alert("Falha crítica de comunicação de dados.");
                btn.innerText = "ACESSAR ECOSSISTEMA";
            }
        }

        // Fluxo Real de Comunicação da IA (Substituição da Resposta Genérica Falsa)
        async function enviarMensagem(texto, canal) {
            if (!texto.trim()) return;

            const chatBox = document.getElementById('chatBox');

            // Renderiza mensagem do Aluno
            const userDiv = document.createElement('div');
            userDiv.className = "message user";
            userDiv.innerText = texto;
            chatBox.appendChild(userDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Renderiza Placeholder de Carregamento
            const aiDivPlaceholder = document.createElement('div');
            aiDivPlaceholder.className = "message ai";
            aiDivPlaceholder.innerText = "Analyzing response parameters...";
            chatBox.appendChild(aiDivPlaceholder);
            chatBox.scrollTop = chatBox.scrollHeight;

            const payload = {
                acao: "processar_interacao",
                dados: {
                    nome_aba: usuarioSessao.aba,
                    input_texto: texto,
                    canal: canal
                }
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                
                const resultado = await response.json();
                
                // Exibe o retorno vindo nativamente do Gemini 1.5 Flash
                if (resultado.status === "sucesso" || resultado.status === "bloqueado") {
                    aiDivPlaceholder.innerText = resultado.reply;
                } else {
                    aiDivPlaceholder.innerText = "I found a problem processing that statement. Can you rephrase?";
                }
            } catch (err) {
                aiDivPlaceholder.innerText = "Connection with AI Studio lost. Pushing next synchronization.";
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarMensagemTexto() {
            const input = document.getElementById('userInput');
            const texto = input.value.trim();
            if(texto) {
                enviarMensagem(texto, "Texto");
                input.value = "";
            }
        }

        function verificarTecla(e) {
            if (e.key === 'Enter') enviarMensagemTexto();
        }

        // Configuração de Voz Nativa (Speech-to-Text)
        function configurarReconhecimentoVoz() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US'; // Executivos treinam diretamente em inglês
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const resultadoVoz = event.results[0][0].transcript;
                    enviarMensagem(resultadoVoz, "Voz");
                };

                recognition.onend = () => {
                    gravando = false;
                    document.getElementById('micBtn').classList.remove('recording');
                };
            }
        }

        function alternarGravacao() {
            if (!recognition) {
                alert("Navegador não suporta captação de áudio direta em inglês.");
                return;
            }
            if (gravando) {
                recognition.stop();
            } else {
                gravando = true;
                document.getElementById('micBtn').classList.add('recording');
                recognition.start();
            }
        }
    </script>
</body>
</html>
